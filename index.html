<title>Dancefit — Plano de emagrecimento dançando</title>

<link rel="icon" href="assets/logo.png" type="image/png" />

<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet" />
<style>
  /* ============ DESIGN TOKENS (from original inlead config) ============ */
  :root{
    --theme:#f87171;          /* themeColor */
    --theme-dark:#ef4444;
    --theme-darker:#dc2626;
    --bg:#fee2e2;             /* backgroundColor */
    --content:#030712;        /* contentColor */
    --title:#09090b;          /* titleColor */
    --card:#ffffff;
    --muted:#6b7280;
    --radius:.5rem;           /* rounded-md */
    --elh:56px;               /* elementSize */
    --container:44rem;        /* container max-w-[44rem] */
    --font:'Nunito',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:var(--font);
    background:var(--bg);
    color:var(--content);
    line-height:1.45;
    overflow-x:hidden;
  }
  img{max-width:100%;display:block}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

  /* ============ SHELL / HEADER ============ */
  .app{min-height:100dvh;display:flex;flex-direction:column}
  header.topbar{
    background:var(--card);
    box-shadow:0 1px 0 rgba(0,0,0,.06);
    position:sticky;top:0;z-index:40;
  }
  .topbar-inner{
    max-width:var(--container);margin:0 auto;
    display:flex;align-items:center;justify-content:center;gap:.6rem;
    padding:.6rem 1rem .5rem;position:relative;
  }
  .topbar img{height:64px;width:auto}
  .back-btn{
    position:absolute;left:1rem;top:50%;transform:translateY(-50%);
    font-size:1.4rem;color:#9ca3af;line-height:1;padding:.2rem .4rem;display:none;
  }
  .back-btn.show{display:block}
  /* progress bar */
  .progress-wrap{max-width:var(--container);margin:0 auto;width:100%;padding:0 1rem}
  .progress-track{height:6px;background:#fecaca;border-radius:99px;overflow:hidden}
  .progress-fill{height:100%;background:var(--theme);width:0;border-radius:99px;transition:width .45s cubic-bezier(.4,0,.2,1)}

  /* ============ MAIN / STEP ============ */
  main{flex:1;width:100%;max-width:var(--container);margin:0 auto;padding:1.4rem 1rem 3rem}
  .step{animation:fade .4s ease}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  h1.q-title{font-size:1.55rem;font-weight:900;color:var(--title);text-align:center;letter-spacing:-.02em;line-height:1.15;margin-bottom:.4rem}
  h1.q-title.sm{font-size:1.3rem}
  h1.q-title em{color:var(--theme);font-style:normal}
  h1.hero-h{font-size:2rem;margin-bottom:.7rem}
  p.q-sub{text-align:center;color:var(--muted);font-size:.98rem;font-weight:600;margin-bottom:1.4rem;max-width:34rem;margin-left:auto;margin-right:auto}

  /* option list */
  .options{display:flex;flex-direction:column;gap:.65rem;max-width:32rem;margin:0 auto}
  .options.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.65rem}
  .opt{
    background:var(--card);border:2px solid #fecdd3;border-radius:var(--radius);
    min-height:var(--elh);padding:.85rem 1.1rem;display:flex;align-items:center;gap:.8rem;
    font-weight:700;font-size:1.02rem;color:var(--title);text-align:left;transition:all .15s;
    box-shadow:0 1px 2px rgba(0,0,0,.04);width:100%;
  }
  .opt:hover{border-color:var(--theme)}
  .opt:active{transform:scale(.985)}
  .opt.selected{border-color:var(--theme);background:#fff1f2;box-shadow:0 0 0 3px rgba(248,113,113,.25)}
  .opt .emoji{font-size:1.5rem;line-height:1;flex-shrink:0}
  .opt .op-main{display:flex;flex-direction:column;gap:.1rem}
  .opt .op-desc{font-weight:600;font-size:.8rem;color:var(--muted)}
  .opt.center{justify-content:center;text-align:center}
  .opt.card-grid{flex-direction:column;text-align:center;justify-content:center;gap:.5rem;padding:1.1rem .6rem;min-height:118px}
  .opt.card-grid .emoji{font-size:2rem}
  /* layout com imagem lateral (mulher dançando à esquerda, sem sobrepor nada) */
  .side-layout{display:grid;grid-template-columns:minmax(96px,34%) 1fr;gap:.5rem;align-items:end;max-width:34rem;margin:0 auto}
  .side-img{width:100%;object-fit:contain;margin-bottom:.2rem}
  .side-opts{min-width:0}
  .side-opts .options{max-width:none;margin:0}
  .opt .emoji-right{margin-left:auto;font-size:1.5rem;flex-shrink:0}
  .opt.emoji-side{justify-content:space-between}

  /* checkbox option */
  .opt.has-check{padding-left:.9rem}
  .opt-check{width:24px;height:24px;flex-shrink:0;border:2px solid #f9a8bc;border-radius:.35rem;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:.9rem;background:#fff}
  .opt.selected .opt-check{background:var(--theme);border-color:var(--theme)}

  /* option with right-side thumbnail */
  .opt.has-img{justify-content:space-between;padding:.55rem .7rem .55rem 1.1rem;min-height:64px}
  .opt.has-img .op-main{flex:1}
  .opt-thumb{width:66px;height:52px;object-fit:contain;flex-shrink:0;border-radius:.35rem}

  /* ritmo: big image cards */
  .ritmo-opts{display:flex;flex-direction:column;gap:.9rem;max-width:32rem;margin:0 auto}
  .ritmo-card{background:var(--card);border:2px solid #fecdd3;border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .15s}
  .ritmo-card:hover{border-color:var(--theme)}
  .ritmo-card.selected{border-color:var(--theme);box-shadow:0 0 0 3px rgba(248,113,113,.3)}
  .ritmo-head{padding:.8rem 1rem .2rem;font-weight:900;color:var(--title);font-size:1.05rem;text-transform:uppercase;line-height:1.15}
  .ritmo-head span{display:block;font-size:.82rem;font-weight:700;color:var(--muted);text-transform:none}
  .ritmo-card img{width:100%;height:190px;object-fit:cover;display:block;margin-top:.5rem}

  /* intersticial */
  .inter-img{width:100%;max-width:34rem;margin:0 auto;border-radius:var(--radius);display:block}
  .inter-cap{text-align:center;font-weight:900;color:var(--title);font-size:1.35rem;max-width:34rem;margin:1rem auto 0;line-height:1.2}
  .cta-count{opacity:.85;font-weight:800}

  /* notícia VivaBem */
  .news-card{background:#fff;border-radius:var(--radius);overflow:hidden;max-width:34rem;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;box-shadow:0 3px 12px rgba(0,0,0,.07)}
  .news-media{padding:0}
  .news-media img{width:100%;height:auto;display:block}
  .news-cap{font-size:.72rem;color:#374151;font-weight:600;padding:.5rem .6rem}
  .news-cap span{color:#9ca3af}
  .news-body{padding:1rem .9rem;display:flex;flex-direction:column;justify-content:center}
  .news-hl{font-size:1.35rem;font-weight:900;color:#1d4ed8;line-height:1.15;background:linear-gradient(transparent 60%, #bef264 60%);display:inline;box-decoration-break:clone;-webkit-box-decoration-break:clone}
  .news-from{font-weight:900;color:var(--title);margin-top:.8rem;font-size:.95rem}
  .news-footer{text-align:center;font-weight:800;color:var(--title);max-width:34rem;margin:1.2rem auto 0;font-size:.95rem}
  @media(max-width:480px){.news-hl{font-size:1.05rem}.news-card{grid-template-columns:1fr 1.1fr}}

  /* pain dot no thumbnail */
  .opt-thumb-wrap{position:relative;flex-shrink:0}
  .pain-dot{position:absolute;width:20px;height:20px;border-radius:50%;background:radial-gradient(circle,#ef4444 38%,rgba(239,68,68,.4) 68%,transparent 72%);animation:pulse 1.3s infinite;transform:translate(-50%,-50%)}
  @keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.95}50%{transform:translate(-50%,-50%) scale(1.35);opacity:.55}}
  /* posições do ponto de dor sobre cada imagem gerada */
  .pain-costas{top:34%;left:50%}.pain-joelho{top:74%;left:44%}.pain-braco{top:36%;left:42%}.pain-ombro{top:30%;left:52%}

  /* opção de pontos sensíveis: imagem vertical sangrando na direita */
  .opt.sens{padding:0 0 0 1.1rem;min-height:96px;overflow:hidden;align-items:stretch}
  .opt.sens .op-main{align-self:center;flex:1;padding:.6rem 0}
  .sens-wrap{position:relative;width:92px;flex-shrink:0;align-self:stretch}
  .sens-thumb{width:92px;height:100%;object-fit:cover;object-position:center 18%;border-radius:0}

  /* chart projeção peso */
  .chart-tags{display:flex;justify-content:space-between;margin-bottom:.2rem}
  .chart-tags span{background:#fff;border:1px solid #e5e7eb;border-radius:.4rem;padding:.2rem .6rem;font-size:.75rem;font-weight:800;color:var(--title)}
  .chart-note{background:#fff;border-radius:var(--radius);padding:.9rem 1rem;max-width:34rem;margin:1rem auto 0;font-size:.85rem;color:var(--content);font-weight:600;line-height:1.4}
  .pill-red{background:#ef4444;color:#fff;font-weight:900;padding:.05rem .45rem;border-radius:.3rem}
  .pill-green{background:#22c55e;color:#fff;font-weight:900;padding:.05rem .45rem;border-radius:.3rem}

  /* loader2 (barra + carrossel comentários) */
  .loader2{max-width:40rem;margin:0 auto;text-align:center}
  .l2-head{display:flex;justify-content:space-between;font-weight:700;color:var(--title);font-size:.9rem;margin-bottom:.4rem}
  .l2-track{height:12px;background:#e5e7eb;border-radius:99px;overflow:hidden}
  .l2-fill{height:100%;background:#eab308;width:0;border-radius:99px;transition:width .2s}
  .l2-lead{font-weight:800;color:var(--title);margin:1.2rem 0 2rem;font-size:1rem}
  .l2-carousel{overflow:hidden;width:100%;-webkit-mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent)}
  .l2-track-inner{display:flex;gap:1rem;width:max-content;animation:slide 55s linear infinite}
  @keyframes slide{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .l2-comment{background:#fff;border-radius:1rem;padding:1.1rem;width:300px;flex-shrink:0;text-align:left;box-shadow:0 8px 22px rgba(0,0,0,.07)}
  .l2c-top{display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem}
  .l2c-av{width:40px;height:40px;border-radius:50%;background:var(--theme);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0}
  .l2-comment .stars{color:#f59e0b;font-size:.85rem;margin-bottom:.35rem}
  .l2c-name{font-weight:900;color:var(--title);font-size:.95rem;display:block}
  .l2c-h{color:var(--muted);font-size:.8rem;font-weight:600;display:block}
  .l2c-t{color:var(--content);font-weight:600;font-size:.9rem;line-height:1.4}

  /* IMC resumo */
  .imc-top{display:grid;grid-template-columns:auto 1fr;gap:.9rem;align-items:center;max-width:34rem;margin:0 auto 1.2rem}
  .imc-char{width:150px;border-radius:var(--radius)}
  .imc-cards{display:flex;flex-direction:column;gap:.55rem}
  .imc-cardbox{background:#fff;border-radius:var(--radius);padding:.6rem .85rem;box-shadow:0 1px 4px rgba(0,0,0,.05)}
  .imc-cardbox p{font-size:.75rem;color:var(--muted);font-weight:700;margin-bottom:.05rem}
  .imc-cardbox b{font-size:1.05rem;color:var(--title);font-weight:900}
  .imc-label{font-weight:900;color:var(--title);max-width:34rem;margin:.5rem auto .2rem;font-size:.95rem}
  .imc-obs{font-size:.8rem;color:var(--muted);font-weight:700;max-width:34rem;margin:0 auto}
  .imc-bar-wrap{max-width:34rem;margin:1.4rem auto .4rem;position:relative;padding-top:2rem}
  .imc-badge{position:absolute;top:0;transform:translateX(-50%);background:#18181b;color:#fff;font-weight:800;font-size:.8rem;padding:.3rem .7rem;border-radius:.4rem;white-space:nowrap;max-width:calc(100vw - 3rem)}
  .imc-badge::after{content:'';position:absolute;bottom:-5px;left:var(--arrow,50%);transform:translateX(-50%);border:5px solid transparent;border-top-color:#18181b;border-bottom:0}
  .imc-bar{height:10px;border-radius:99px;background:linear-gradient(to right,#14b8a6,#84cc16,#eab308,#f97316,#ef4444)}
  .imc-marker{position:absolute;top:calc(2rem - 4px);width:18px;height:18px;border-radius:50%;background:#fff;border:4px solid var(--theme);transform:translateX(-50%);box-shadow:0 1px 4px rgba(0,0,0,.3)}
  .imc-alert{background:#fff;border-radius:var(--radius);padding:.9rem 1rem;max-width:34rem;margin:1.2rem auto 0;font-size:.82rem;color:var(--content);font-weight:600;line-height:1.4;border-left:4px solid var(--theme)}

  /* CTA button */
  .cta{
    display:block;width:100%;max-width:32rem;margin:1.4rem auto 0;
    background:var(--theme);color:#fff;font-weight:900;font-size:1.05rem;letter-spacing:.01em;
    min-height:var(--elh);border-radius:var(--radius);padding:.9rem;text-transform:uppercase;
    box-shadow:0 6px 16px rgba(248,113,113,.4);transition:all .15s;
  }
  .cta:hover{background:var(--theme-dark)}
  .cta:active{transform:translateY(1px)}
  .cta[disabled]{opacity:.45;pointer-events:none;box-shadow:none}
  .cta.big{font-size:1.15rem;min-height:62px}

  /* social proof card (horizontal) */
  .sp-card{
    background:#fff;border-radius:1.5rem;padding:.9rem 1.1rem;margin:0 auto 1.6rem;max-width:33rem;
    display:flex;align-items:center;gap:.7rem;box-shadow:0 6px 20px rgba(0,0,0,.06);
  }
  .sp-avatars{display:flex;flex-shrink:0}
  .sp-avatars img{width:44px;height:44px;border-radius:50%;object-fit:cover;border:3px solid #fff;margin-left:-14px;box-shadow:0 1px 3px rgba(0,0,0,.15)}
  .sp-avatars img:first-child{margin-left:0}
  .sp-heart{width:44px;height:44px;border-radius:50%;background:var(--theme);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;margin-left:.2rem;animation:beat 1.1s infinite}
  @keyframes beat{0%,100%{transform:scale(1)}20%{transform:scale(1.18)}40%{transform:scale(1)}}
  .sp-text{font-weight:700;color:var(--title);font-size:.95rem;line-height:1.25}
  .sp-text b{color:var(--title);font-weight:900}

  /* faixa etária cards (photo + coral banner) */
  .faixa-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;max-width:33rem;margin:0 auto}
  .faixa-card{background:#fff;border:2px solid #fecdd3;border-radius:var(--radius);overflow:hidden;transition:all .15s;cursor:pointer;padding:0}
  .faixa-card:hover{border-color:var(--theme)}
  .faixa-card:active{transform:scale(.99)}
  .faixa-card.selected{border-color:var(--theme);box-shadow:0 0 0 3px rgba(248,113,113,.3)}
  .faixa-photo{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;padding:.6rem;background:radial-gradient(circle at 50% 45%, #fbb6c4 0%, #f9a8bc 60%, #fecdd3 100%)}
  .faixa-photo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
  .faixa-label{background:var(--theme);color:#fff;font-weight:800;font-size:1.05rem;text-align:center;padding:.85rem .4rem}

  /* secure card (lock in coral square) */
  .secure{margin:1.8rem auto 0;max-width:33rem;background:#fff;border-radius:1rem;padding:1rem 1.1rem;display:flex;align-items:center;gap:.85rem;box-shadow:0 4px 14px rgba(0,0,0,.05)}
  .secure .lock{width:48px;height:48px;border-radius:.7rem;background:var(--theme);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
  .secure .stxt b{display:block;color:var(--title);font-weight:900;font-size:1rem;margin-bottom:.1rem}
  .secure .stxt span{color:var(--muted);font-weight:600;font-size:.85rem}

  /* input */
  .field{max-width:32rem;margin:0 auto}
  .field input{
    width:100%;min-height:var(--elh);border:2px solid #fecdd3;border-radius:var(--radius);
    padding:.9rem 1rem;font-size:1.05rem;font-weight:700;font-family:inherit;background:#fff;color:var(--title);
  }
  .field input:focus{outline:none;border-color:var(--theme);box-shadow:0 0 0 3px rgba(248,113,113,.2)}

  /* ruler / slider steps */
  .measure{max-width:32rem;margin:0 auto;text-align:center}
  .unit-toggle{display:inline-flex;background:#fecaca;border-radius:99px;padding:4px;margin:0 auto 1.2rem;gap:2px}
  .unit-toggle button{padding:.4rem 1.3rem;border-radius:99px;font-weight:800;font-size:.95rem;color:var(--theme-darker)}
  .unit-toggle button.active{background:var(--theme);color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15)}
  .big-value{font-size:2.6rem;font-weight:900;color:var(--title);margin:.3rem 0 .1rem}
  .big-value small{font-size:1.2rem;color:var(--muted)}
  .measure .hint{color:var(--muted);font-weight:600;font-size:.85rem;margin-top:.4rem}
  /* régua interativa com ticks */
  .ruler{position:relative;height:92px;overflow:hidden;margin:1.1rem 0 0;touch-action:none;cursor:grab;
    -webkit-mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent)}
  .ruler:active{cursor:grabbing}
  .ruler-track{position:absolute;top:8px;left:0;display:flex;height:100%;will-change:transform;transition:transform .07s linear}
  .tick{flex-shrink:0;position:relative}
  .tick::before{content:'';position:absolute;left:50%;top:0;width:2px;height:16px;background:#eab6bd;transform:translateX(-50%)}
  .tick.major::before{height:30px;background:#d98b96}
  .tick .tlabel{position:absolute;top:36px;left:50%;transform:translateX(-50%);font-size:.9rem;color:#8b8b8b;font-weight:600}
  .ruler::after{content:'';position:absolute;left:0;right:0;top:70px;height:1px;background:#dcb6ba}
  .ruler-center{position:absolute;left:50%;top:0;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;pointer-events:none}
  .ruler-needle{width:3px;height:62px;background:var(--theme-darker);border-radius:2px}
  .ruler-tri{width:0;height:0;border:8px solid transparent;border-bottom-color:var(--theme-darker);border-top:0;margin-top:1px}
  .bmi-note{background:#fff;border-radius:var(--radius);padding:.9rem 1rem;margin-top:1.2rem;font-size:.85rem;color:var(--muted);font-weight:600}

  /* loader */
  .loader{max-width:30rem;margin:0 auto;text-align:center}
  .loader h1{font-size:1.5rem;font-weight:900;color:var(--title);margin-bottom:.5rem}
  .loader .lead{color:var(--muted);font-weight:700;margin-bottom:1.6rem}
  .load-list{display:flex;flex-direction:column;gap:.2rem;text-align:left;margin-top:1rem;background:#fff;border-radius:1.2rem;padding:1.2rem 1.1rem;box-shadow:0 10px 30px rgba(0,0,0,.07)}
  .load-item{padding:.6rem 0;display:flex;align-items:flex-start;gap:.85rem;opacity:.3;transition:opacity .45s;position:relative}
  .load-item:not(:last-child)::before{content:'';position:absolute;left:14px;top:40px;bottom:-6px;width:2px;background:#fbd3da}
  .load-item.done,.load-item.active{opacity:1}
  .load-item .ico{width:30px;height:30px;border-radius:50%;background:#fbd3da;color:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:900;position:relative;z-index:1}
  .load-item.done .ico{background:var(--theme)}
  .load-item.active .ico{background:var(--theme);animation:beat 1s infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .load-item b{font-weight:800;color:var(--title);display:block;font-size:.98rem}
  .load-item span{font-size:.8rem;color:var(--muted);font-weight:600}
  .circle-pct{font-size:3rem;font-weight:900;color:var(--theme-darker);margin:1rem 0 .4rem}

  /* chart */
  .chart-card{background:#fff;border-radius:1rem;padding:1.2rem 1rem 1rem;max-width:34rem;margin:0 auto;box-shadow:0 4px 16px rgba(0,0,0,.06)}
  .chart-svg{width:100%;height:auto;display:block}
  .chart-line{stroke-dasharray:1400;stroke-dashoffset:1400;animation:dashdraw 1.8s ease-out forwards}
  @keyframes dashdraw{to{stroke-dashoffset:0}}
  .chart-legend{display:flex;justify-content:space-between;font-size:.8rem;font-weight:700;color:var(--muted);margin-top:.4rem;padding:0 .3rem}
  .goal-line{text-align:center;font-weight:800;margin:1rem auto;color:var(--title)}
  .goal-line b{color:var(--theme-darker)}

  /* plano final (personagem + cards coral) */

function fmtDatePlus(days){
  const d=new Date(); d.setDate(d.getDate()+days);
  const meses=["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];
  return `${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
}

function setProgress(){
  const pct = Math.min(100, Math.round((idx/(STEPS.length-1))*100));
  progress.style.width = pct+"%";
  backBtn.classList.toggle('show', idx>0);
}

function go(n){ idx=Math.max(0,Math.min(STEPS.length-1,n)); render(); window.scrollTo({top:0,behavior:'instant'}); }
backBtn.onclick = ()=>go(idx-1);

function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstChild; }

/* render option list (single / multi / landing) */
function renderOptions(step, container){
  const box = el(`<div class="options ${step.grid?'grid2':''} ${step.offsetRight?'offset-right':''}"></div>`);
  step.options.forEach(o=>{
    const isMulti = step.type==='multi';
    const selectedVals = isMulti ? state[step.key] : [state[step.key]];
    const sel = selectedVals && selectedVals.includes(o.label);
    const b = el(`<button class="opt ${step.grid?'card-grid':''} ${step.checkbox?'has-check':''} ${step.emojiSide==='right'?'emoji-side':''} ${step.sensImg&&o.img?'sens':''} ${(o.desc||o.emoji||o.img||step.checkbox)&&!step.grid?'':'center'} ${o.img?'has-img':''} ${sel?'selected':''}">
      ${step.checkbox?`<span class="opt-check">${sel?'✓':''}</span>`:''}
      ${o.emoji&&step.emojiSide!=='right'?`<span class="emoji">${o.emoji}</span>`:''}
      <span class="op-main"><span>${o.label}</span>${o.desc?`<span class="op-desc">${o.desc}</span>`:''}</span>
      ${o.emoji&&step.emojiSide==='right'?`<span class="emoji emoji-right">${o.emoji}</span>`:''}
      ${o.img?`<span class="opt-thumb-wrap ${step.sensImg?'sens-wrap':''}"><img class="opt-thumb ${step.sensImg?'sens-thumb':''}" src="${o.img}" alt="" onerror="this.style.display='none'"/>${o.dot?`<span class="pain-dot pain-${o.dot}"></span>`:''}</span>`:''}
    </button>`);
    b.onclick=()=>{
      if(isMulti){
        const arr=state[step.key];
        const i=arr.indexOf(o.label);
        if(i>=0)arr.splice(i,1); else arr.push(o.label);
        render(); // refresh selection state + enable CTA
      }else{
        state[step.key]=o.label;
        if(step.advance){ render(); } // show highlight then user taps continue
        else { setTimeout(()=>go(idx+1),180); }
      }
    };
    box.appendChild(b);
  });
  container.appendChild(box);
}

      wrap.appendChild(el(`<div class="secure">

        <span class="stxt"><b>100% seguro e sigiloso</b><span>Suas respostas serão usadas apenas para personalizar seu plano.</span></span>
      </div>`));
      break;
    }
    case 'single': case 'multi':{
      wrap.appendChild(el(`<h1 class="q-title">${step.title}</h1>`));
      if(step.sub) wrap.appendChild(el(`<p class="q-sub">${step.sub}</p>`));
      if(step.sideImg){

        const col=el(`<div class="side-opts"></div>`);
        renderOptions(step, col);
        row.appendChild(col);
        wrap.appendChild(row);
      } else {
        renderOptions(step, wrap);
      }
      const need = step.type==='multi' ? state[step.key].length>0 : !!state[step.key];
      if(step.advance || step.type==='multi'){
        const cta = el(`<button class="cta" ${need?'':'disabled'}>Continuar</button>`);
        cta.onclick=()=>go(idx+1);

      }
      break;
    }
    case 'ritmo':{
      wrap.appendChild(el(`<h1 class="q-title">${step.title}</h1>`));
      if(step.sub) wrap.appendChild(el(`<p class="q-sub">${step.sub}</p>`));
      const box=el(`<div class="ritmo-opts"></div>`);
      step.options.forEach(o=>{
        const sel=state[step.key]===o.label;
        const c=el(`<div class="ritmo-card ${sel?'selected':''}">
          <div class="ritmo-head">${o.label}<span>${o.desc||''}</span></div>
          <img src="${o.img}" alt="" onerror="this.style.display='none'"/>
        </div>`);
        c.onclick=()=>{ state[step.key]=o.label; render(); };
        box.appendChild(c);
      });
      wrap.appendChild(box);
      const cta=el(`<button class="cta" ${state[step.key]?'':'disabled'}>Continuar</button>`);
      cta.onclick=()=>go(idx+1); wrap.appendChild(cta);
      break;
    }
    case 'interstitial': renderInterstitial(step,wrap); break;
    case 'news': renderNews(step,wrap); break;
    case 'chartPeso': renderChartPeso(step,wrap); break;
    case 'imcResumo': renderImc(step,wrap); break;
    case 'loader': renderLoader(step,wrap,false); break;
    case 'loader2': renderLoader(step,wrap,true); break;
    case 'altura': renderRuler(wrap,'altura','cm','pol',140,220,'Calculando seu índice de massa corporal (IMC)',step.sub); break;
    case 'peso': renderRuler(wrap,'peso','kg','lb',40,180,null,null,step.title); break;
    case 'metaPeso': renderRuler(wrap,'metaPeso','kg','lb',40,180,null,null,step.title); break;
    case 'nome':{
      wrap.appendChild(el(`<h1 class="q-title">${step.title}</h1>`));
      wrap.appendChild(el(`<p class="q-sub">${step.sub}</p>`));
      const field=el(`<div class="field"><input id="nomeInput" type="text" placeholder="Digite seu nome..." value="${state.nome}"/></div>`);
      wrap.appendChild(field);
      const cta=el(`<button class="cta" ${state.nome.trim()?'':'disabled'}>Continuar</button>`);
      wrap.appendChild(cta);
      setTimeout(()=>{
        const inp=field.querySelector('input');
        inp.oninput=()=>{state.nome=inp.value; cta.toggleAttribute('disabled', !inp.value.trim());};
        cta.onclick=()=>{ if(state.nome.trim()) go(idx+1); };
      });
      break;
    }
    case 'chartData': renderChartData(step,wrap); break;
    case 'resumo': renderResumo(step,wrap); break;
    case 'sales': renderSales(wrap); break;
  }
  main.appendChild(wrap);
  setProgress();
}

/* CTA que só habilita após `delay` segundos (mecânica do original) */
function addDelayedCta(step,wrap){
  const secs = step.delay||0;
  const cta = el(`<button class="cta" ${secs?'disabled':''}>Continuar${secs?` <span class="cta-count">(${secs})</span>`:''}</button>`);
  cta.onclick=()=>{ if(!cta.hasAttribute('disabled')) go(idx+1); };
  wrap.appendChild(cta);
  if(secs){
    let left=secs;
    const t=setInterval(()=>{
      left--;
      const c=cta.querySelector('.cta-count');
      if(left<=0){ clearInterval(t); cta.removeAttribute('disabled'); cta.innerHTML='Continuar'; }
      else if(c){ c.textContent=`(${left})`; }
    },1000);
  }
}

/* SVG com curva ondulada e gradiente vermelho→verde (como no print) */
function wavySVG(atual,meta){
  const W=520,H=300,padL=34,padR=20,padT=20,padB=40;
  const x0=padL,x1=W-padR,y0=padT,y1=H-padB;
  // pontos: começa alto (peso atual), oscila e desce até meta
  const ys=[0.05,0.28,0.42,0.30,0.62,0.92];
  const pts=ys.map((v,i)=>[x0+(i/(ys.length-1))*(x1-x0), y0+v*(y1-y0)]);
  // caminho suave (Catmull-Rom → bezier)
  function smooth(p){let d=`M ${p[0][0]} ${p[0][1]}`;for(let i=0;i<p.length-1;i++){const p0=p[i-1]||p[i],p1=p[i],p2=p[i+1],p3=p[i+2]||p2;const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6,c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;d+=` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p2[0]} ${p2[1]}`;}return d;}
  const line=smooth(pts);
  const area=line+` L ${x1} ${y1} L ${x0} ${y1} Z`;
  const grid=[0,20,40,60,80].map(v=>{const y=y1-(v/80)*(y1-y0);return `<line x1="${x0}" y1="${y}" x2="${x1}" y2="${y}" stroke="#e5e7eb" stroke-dasharray="4 4"/><text x="${x0-6}" y="${y+4}" font-size="11" fill="#9ca3af" text-anchor="end">${v}</text>`;}).join('');
  const dots=pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="7" fill="#d1d5db" opacity=".7"/><circle cx="${p[0]}" cy="${p[1]}" r="4.5" fill="${i===0?'#ef4444':i===pts.length-1?'#22c55e':(i<3?'#ef4444':'#f59e0b')}"/>`).join('');
  return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="gline" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#ef4444"/><stop offset="45%" stop-color="#f59e0b"/><stop offset="70%" stop-color="#eab308"/><stop offset="100%" stop-color="#22c55e"/>
      </linearGradient>
      <linearGradient id="garea" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#ef4444" stop-opacity=".35"/><stop offset="50%" stop-color="#f59e0b" stop-opacity=".3"/><stop offset="100%" stop-color="#22c55e" stop-opacity=".3"/>
      </linearGradient>
    </defs>
    ${grid}
    <path d="${area}" fill="url(#garea)"/>
    <path d="${line}" fill="none" stroke="url(#gline)" stroke-width="4" stroke-linecap="round"/>
    ${dots}
  </svg>`;
}

/* ---------- RULER / SLIDER ---------- */
function renderRuler(wrap,key,u1,u2,min,max,noteTitle,noteBody,titleOverride){
  const step=STEPS[idx];
  wrap.appendChild(el(`<h1 class="q-title">${titleOverride||step.title}</h1>`));
  const isHeight = key==='altura';
  const unitKey = isHeight?'unidadeAltura':'unidadePeso';
  const SP=12; // px por unidade da régua
  const box=el(`<div class="measure">
    <div class="unit-toggle">
      <button data-u="${u1}" class="active">${u1}</button>
      <button data-u="${u2}">${u2}</button>
    </div>
    <div class="big-value"><span id="rv">${state[key]}</span><small>${state[unitKey]}</small></div>
    <div class="ruler" id="ruler">
      <div class="ruler-track" id="rtrack"></div>
      <div class="ruler-center"><div class="ruler-needle"></div><div class="ruler-tri"></div></div>
    </div>
    <p class="hint">Arraste para ajustar</p>
    ${noteTitle?`<div class="bmi-note"><b>${noteTitle}</b><br>${noteBody||''}</div>`:''}
  </div>`);
  wrap.appendChild(box);
  const cta=el(`<button class="cta">Continuar</button>`);
  cta.onclick=()=>go(idx+1);
  wrap.appendChild(cta);
  const ruler=box.querySelector('#ruler'), track=box.querySelector('#rtrack'), rv=box.querySelector('#rv');
  // gera os ticks (traço maior + número a cada 10)
  let ticks='';
  for(let v=min;v<=max;v++){
    const major=v%10===0;
    ticks+=`<div class="tick ${major?'major':''}" style="width:${SP}px">${major?`<span class="tlabel">${v}</span>`:''}</div>`;
  }
  track.innerHTML=ticks;
  function paint(){
    const cw=ruler.clientWidth||320;
    track.style.transform=`translateX(${cw/2-(state[key]-min)*SP-SP/2}px)`;
    rv.textContent=state[key];
  }
  requestAnimationFrame(paint);
  // arrastar para ajustar (mouse + touch)
  let dragging=false,startX=0,startVal=0;
  ruler.addEventListener('pointerdown',e=>{dragging=true;startX=e.clientX;startVal=state[key];try{ruler.setPointerCapture(e.pointerId);}catch(_){}});
  ruler.addEventListener('pointermove',e=>{if(!dragging)return;
    const dv=Math.round((startX-e.clientX)/SP);
    state[key]=Math.max(min,Math.min(max,startVal+dv));paint();});
  ruler.addEventListener('pointerup',()=>dragging=false);
  ruler.addEventListener('pointercancel',()=>dragging=false);
  box.querySelectorAll('.unit-toggle button').forEach(b=>b.onclick=()=>{
    box.querySelectorAll('.unit-toggle button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); state[unitKey]=b.dataset.u; box.querySelector('.big-value small').textContent=b.dataset.u;
  });
}

/* curva por data com grade tracejada, pills e desenho animado */
function dateSVG(atual,meta){
  const W=520,H=290,padL=46,padR=34,padT=40,padB=42;
  const x0=padL,x1=W-padR,y0=padT,y1=H-padB;
  const n=40,pts=[];
  for(let i=0;i<=n;i++){const t=i/n;const ease=1-Math.pow(1-t,2.1);pts.push([x0+t*(x1-x0), y0+ease*(y1-y0)*0.8]);}
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=d+` L ${x1} ${y1} L ${x0} ${y1} Z`;
  const gridV=[0,1/3,2/3,1].map(t=>{const x=x0+t*(x1-x0);return `<line x1="${x}" y1="${y0-10}" x2="${x}" y2="${y1}" stroke="#e5e7eb" stroke-dasharray="4 4"/>`;}).join('');
  const gridH=[0,25,50,75].map(v=>{const y=y1-(v/85)*(y1-y0);return `<line x1="${x0}" y1="${y}" x2="${x1}" y2="${y}" stroke="#f1f5f9"/><text x="${x0-8}" y="${y+4}" font-size="11" fill="#9ca3af" text-anchor="end">${v}</text>`;}).join('');
  const labels=['Hoje','10 dias','20 dias','28 dias'].map((l,i)=>{const x=x0+(i/3)*(x1-x0);return `<text x="${x}" y="${H-10}" font-size="11" fill="#9ca3af" text-anchor="middle" font-weight="700">${l}</text>`;}).join('');
  const mids=[1/3,2/3].map(t=>{const p=pts[Math.round(t*n)];return `<circle cx="${p[0]}" cy="${p[1]}" r="8" fill="#e5e7eb" opacity=".8"/><circle cx="${p[0]}" cy="${p[1]}" r="5" fill="${t<.5?'#ef4444':'#f59e0b'}"/>`;}).join('');
  const s=pts[0],e2=pts[n];
  return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="dg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ef4444"/><stop offset="55%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#22c55e"/></linearGradient>
      <linearGradient id="da" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ef4444" stop-opacity=".28"/><stop offset="100%" stop-color="#22c55e" stop-opacity=".22"/></linearGradient>
    </defs>
    ${gridH}${gridV}
    <path d="${area}" fill="url(#da)"/>
    <path class="chart-line" d="${d}" fill="none" stroke="url(#dg)" stroke-width="4" stroke-linecap="round"/>
    ${mids}
    <circle cx="${s[0]}" cy="${s[1]}" r="9" fill="#fecaca"/><circle cx="${s[0]}" cy="${s[1]}" r="5.5" fill="#ef4444"/>
    <circle cx="${e2[0]}" cy="${e2[1]}" r="9" fill="#bbf7d0"/><circle cx="${e2[0]}" cy="${e2[1]}" r="5.5" fill="#16a34a"/>
    <g><rect x="${s[0]-10}" y="${s[1]-36}" rx="7" width="70" height="25" fill="#dc2626"/><text x="${s[0]+25}" y="${s[1]-18}" font-size="13" fill="#fff" font-weight="900" text-anchor="middle">${atual} kg</text></g>
    <g><rect x="${e2[0]-140}" y="${e2[1]-42}" rx="7" width="140" height="27" fill="#fff" stroke="#e5e7eb"/><text x="${e2[0]-70}" y="${e2[1]-24}" font-size="12" fill="#111827" font-weight="800" text-anchor="middle">${meta} kg em 28 dias</text></g>
    ${labels}
  </svg>`;
}

/* SVG descending curve */
function curveSVG(atual,meta,labels){
  const W=520,H=200,pad=30;
  const drop=Math.max(0,atual-meta);
  const y0=pad+10, y1=H-pad-10;
  const pts=[];
  const n=40;
  for(let i=0;i<=n;i++){
    const t=i/n;
    const ease=1-Math.pow(1-t,2.2);
    const x=pad+t*(W-2*pad);
    const y=y0+ease*(y1-y0);
    pts.push([x,y]);
  }
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=d+` L ${W-pad} ${H-pad} L ${pad} ${H-pad} Z`;
  const lbl=labels.map((l,i)=>{const x=pad+(i/(labels.length-1))*(W-2*pad);return `<text x="${x}" y="${H-8}" font-size="11" fill="#9ca3af" text-anchor="middle" font-weight="700">${l}</text>`;}).join('');
  return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171" stop-opacity=".35"/><stop offset="100%" stop-color="#f87171" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#g)"/>
    <path d="${d}" fill="none" stroke="#ef4444" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="${pts[0][0]}" cy="${pts[0][1]}" r="6" fill="#ef4444"/>
    <circle cx="${pts[pts.length-1][0]}" cy="${pts[pts.length-1][1]}" r="7" fill="#16a34a"/>
    <text x="${pts[0][0]}" y="${pts[0][1]-12}" font-size="13" fill="#111" font-weight="900" text-anchor="start">${atual}kg</text>
    <text x="${pts[pts.length-1][0]}" y="${pts[pts.length-1][1]-12}" font-size="13" fill="#16a34a" font-weight="900" text-anchor="end">${meta}kg</text>
    ${lbl}
  </svg>`;
}

/* carrossel automático com dots */
function buildCarousel(imgs){
  const c=el(`<div class="carousel-wrap"><div class="carousel"><div class="car-track"></div></div><div class="car-dots"></div></div>`);
  const tr=c.querySelector('.car-track'),dots=c.querySelector('.car-dots');
  imgs.forEach((src,k)=>{
    tr.appendChild(el(`<div class="car-slide"><img src="${src}" alt="" onerror="this.style.display='none'"/></div>`));
    dots.appendChild(el(`<span class="car-dot ${k===0?'on':''}"></span>`));
  });
  let i=0;const n=imgs.length;
  const show=k=>{i=(k+n)%n;tr.style.transform=`translateX(-${i*100}%)`;[...dots.children].forEach((d,j)=>d.classList.toggle('on',j===i));};
  setInterval(()=>show(i+1),3500);
  [...dots.children].forEach((d,j)=>d.onclick=()=>show(j));
  return c;
}
